<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusQuest – Entrar</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --gold: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #2d2d4e;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* bg particles */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,58,237,.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 75%, rgba(168,85,247,.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      position: relative;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .logo {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--accent2);
      margin-bottom: 6px;
    }
    .logo span { color: var(--gold); }

    .tagline {
      text-align: center;
      color: var(--muted);
      font-size: .85rem;
      margin-bottom: 32px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: .95rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      width: 100%;
    }
    input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 3px rgba(168,85,247,.15);
    }
    input::placeholder { color: var(--muted); font-size: .88rem; }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .1s;
      letter-spacing: .03em;
    }
    .btn-submit:hover { opacity: .9; }
    .btn-submit:active { transform: scale(.98); }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--muted);
      font-size: .8rem;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .link-row {
      text-align: center;
      font-size: .87rem;
      color: var(--muted);
    }
    .link-row a {
      color: var(--accent2);
      text-decoration: none;
      font-weight: 600;
    }
    .link-row a:hover { text-decoration: underline; }

    .alert {
      border-radius: 8px;
      padding: 11px 14px;
      font-size: .85rem;
      margin-bottom: 16px;
      display: none;
    }
    .alert.error   { background: rgba(239,68,68,.12);  border: 1px solid rgba(239,68,68,.35);  color: #fca5a5; }
    .alert.success { background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.35); color: #6ee7b7; }
    .alert.show    { display: block; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .badges-hint {
      display: flex;
      justify-content: center;
      gap: 8px;
      font-size: 1.4rem;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Focus<span>Quest</span></div>
    <p class="tagline">Estude como um herói. Evolua todo dia.</p>
    <div class="badges-hint" aria-hidden="true">🍅 ⚡ 🏆 🔥 💎</div>

    <div class="alert error" id="alert-error"></div>
    <div class="alert success" id="alert-success"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="seu@email.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn-submit" id="btn-submit">Entrar</button>
    </form>

    <div class="divider">ou</div>

    <div class="link-row">
      Não tem conta? <a href="register.html">Criar conta grátis</a>
    </div>
  </div>

<script>
const API = "http://localhost:5000/api";

const form      = document.getElementById("login-form");
const btnSubmit = document.getElementById("btn-submit");
const errBox    = document.getElementById("alert-error");
const okBox     = document.getElementById("alert-success");

function showError(msg) {
  errBox.textContent = msg;
  errBox.classList.add("show");
  okBox.classList.remove("show");
}
function showSuccess(msg) {
  okBox.textContent = msg;
  okBox.classList.add("show");
  errBox.classList.remove("show");
}
function clearAlerts() {
  errBox.classList.remove("show");
  okBox.classList.remove("show");
}
function setLoading(on) {
  btnSubmit.disabled = on;
  btnSubmit.innerHTML = on
    ? '<span class="spinner"></span>Entrando...'
    : "Entrar";
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  clearAlerts();

  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    showError("Preencha e-mail e senha.");
    return;
  }

  setLoading(true);
  try {
    const res = await fetch(`${API}/auth/login`, {
      method:      "POST",
      headers:     { "Content-Type": "application/json" },
      credentials: "include",
      body:        JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (!res.ok) {
      showError(data.error || "Erro ao entrar.");
      return;
    }

    showSuccess(`Bem-vindo de volta, ${data.user.name}! 🎮`);
    setTimeout(() => { window.location.href = "index.html"; }, 800);
  } catch {
    showError("Não foi possível conectar ao servidor. Verifique se o backend está rodando.");
  } finally {
    setLoading(false);
  }
});
</script>
</body>
</html>
